<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>log(Universe)</title>
  <style>
    html,
    body {
      background: #000;
      color-scheme: dark;
    }

    body {
      opacity: 0;
      transition: opacity 0.3s ease-out;
    }
  </style>


</head>

<body>
  <header>
    <div class="header-left">
      <h1 id="page-title" style="cursor: pointer;">log(Universe)</h1>
    </div>
    <div class="header-center">
      <div id="search-container">
        <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
        <div id="search-results"></div>
      </div>
    </div>
    <div class="header-right">
      <button id="mobile-menu-toggle" aria-label="Toggle Controls"
        style="display: none; background: transparent; border: none; color: #00aaff; padding: 5px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="controls-wrapper">
        <div class="select-container">
          <label for="dimension-select-y">Y:</label>
          <select id="dimension-select-y">
            <option value="length">Length</option>
            <option value="mass">Mass</option>
            <option value="duration">Duration</option>
            <option value="energy">Energy</option>
          </select>
          <label for="dimension-select-x" style="margin-left: 10px;">X:</label>
          <select id="dimension-select-x">
            <option value="none"></option>
            <option value="length">Length</option>
            <option value="mass">Mass</option>
            <option value="duration">Duration</option>
            <option value="energy">Energy</option>
          </select>
        </div>
        <button id="tour-btn" title="Start Tour Mode">Tour</button>
        <button id="recenter-btn" title="Recenter View">Recenter</button>
        <div id="mobile-legend"></div>
      </div>
  </header>

  <!-- About Modal -->
  <div id="about-overlay" style="display: none;">
    <div id="about-modal">
      <button id="about-close" aria-label="Close">&times;</button>
      <h2>log(Universe)</h2>
      <p>An interactive visualization of the scales of the universe.</p>
      <p class="about-links">
        <a href="/THIRD-PARTY-LICENSES.txt" target="_blank">Third-Party Licenses</a>
      </p>
    </div>
  </div>

  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body>

</html>
