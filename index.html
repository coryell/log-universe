<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Poster</title>
</head>

<body>
  <header>
    <div class="header-left">
      <h1 id="page-title">log(Universe)</h1>
    </div>
    <div class="header-center">
      <div id="search-container">
        <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
        <div id="search-results"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="select-container">
        <label for="dimension-select-y">Y:</label>
        <select id="dimension-select-y">
          <option value="length">Length</option>
          <option value="mass">Mass</option>
        </select>
        <label for="dimension-select-x" style="margin-left: 10px;">X:</label>
        <select id="dimension-select-x">
          <option value="none"></option>
          <option value="length">Length</option>
          <option value="mass">Mass</option>
        </select>
      </div>
      <button id="recenter-btn">recenter</button>
    </div>
  </header>
  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body>

</html>
