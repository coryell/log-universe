<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Universe Data Editor</title>
    <style>
        :root {
            --bg-primary: #f0f0f0;
            --text-primary: #333;
            --bg-card: white;
            --border-color: #ddd;
            --border-strong: #ccc;
            --bg-header: #f8f9fa;
            --accent-color: #007bff;
            --accent-hover: #0056b3;
            --hover-bg: #f9f9f9;
            --input-focus-bg: #e8f0fe;
            --dim-text: #555;
            --drag-handle-color: #ccc;
            --drag-over-border: #007bff;
            --remove-btn-color: #ddd;
            --remove-btn-hover: #dc3545;
            --insert-color: #28a745;
            --insert-hover: #218838;
            --toast-bg: #333;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --text-primary: #e0e0e0;
            --bg-card: #1e1e1e;
            --border-color: #333;
            --border-strong: #444;
            --bg-header: #252525;
            --accent-color: #375a7f;
            --accent-hover: #4b71a0;
            --hover-bg: #2a2a2a;
            --input-focus-bg: #2c3e50;
            --dim-text: #aaa;
            --drag-handle-color: #444;
            --drag-over-border: #375a7f;
            --remove-btn-color: #444;
            --remove-btn-hover: #ff5c5c;
            --insert-color: #1e7e34;
            --insert-hover: #218838;
            --toast-bg: #444;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: sans-serif;
            padding: 20px 40px;
            background: var(--bg-primary);
            color: var(--text-primary);
            width: fit-content;
            min-width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 20px;
        }

        .controls {
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            padding: 10px 0;
            border-bottom: 1px solid var(--border-strong);
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background: var(--accent-hover);
        }

        table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            box-shadow: 0 1px 3px var(--shadow);
        }

        th,
        td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: var(--bg-header);
            position: sticky;
            top: 60px;
            z-index: 10;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 4px;
            border: 1px solid transparent;
            background: transparent;
            color: inherit;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            outline: none;
            background: var(--input-focus-bg);
        }

        .id-col {
            width: 250px;
            font-family: monospace;
            color: var(--dim-text);
        }

        .name-col {
            width: 250px;
        }

        .desc-col {
            width: 450px;
        }

        .rev-col {
            width: 50px;
            text-align: center;
        }

        .cat-col {
            width: 200px;
        }

        .dim-col {
            width: 150px;
            font-family: monospace;
        }

        .tag-col {
            width: 250px;
        }

        tr:hover {
            background-color: var(--hover-bg);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--toast-bg);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: #dc3545;
        }

        .drag-handle {
            cursor: move;
            color: var(--drag-handle-color);
            user-select: none;
            width: 30px;
            text-align: center;
            font-size: 20px;
        }

        .drag-handle:hover {
            color: var(--dim-text);
        }

        tr.dragging {
            opacity: 0.5;
            background: var(--bg-primary);
        }

        tr.drag-over {
            border-top: 2px solid var(--drag-over-border);
        }

        .remove-btn {
            color: var(--remove-btn-color);
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            background: none;
            border: none;
            padding: 0 5px;
        }

        .remove-btn:hover {
            color: var(--remove-btn-hover);
        }

        button.insert-btn {
            position: fixed;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--insert-color);
            color: white;
            border: none;
            font-size: 20px;
            line-height: 1;
            padding: 0;
            cursor: pointer;
            box-shadow: 0 2px 5px var(--shadow);
            z-index: 1000;
            display: none;
            transform: translateY(-50%);
        }

        button.insert-btn:hover {
            background: var(--insert-hover);
            transform: translateY(-50%) scale(1.1);
        }

        .insert-line {
            position: fixed;
            height: 2px;
            background: var(--insert-color);
            left: 50px;
            right: 50px;
            z-index: 999;
            display: none;
            pointer-events: none;
            opacity: 0.5;
        }

        input.invalid {
            border-color: #dc3545 !important;
            background-color: rgba(220, 53, 69, 0.1) !important;
            box-shadow: 0 0 0 2px rgba(220, 53, 69, 0.25);
        }
    </style>
</head>

<body>



    <button id="leftInsertBtn" class="insert-btn" style="left: 10px;">+</button>
    <button id="rightInsertBtn" class="insert-btn" style="right: 10px;">+</button>
    <div id="insertLine" class="insert-line"></div>

    <div class="controls">
        <button id="saveBtn">Save Changes (Cmd+S)</button>
        <button id="themeToggle" style="margin-left: 10px;">🌓 Toggle Theme</button>
        <select id="langSelect"
            style="margin-left: 10px; padding: 5px; font-size: 16px; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 4px;">
            <option value="en-us">en-us</option>
        </select>
        <span id="status" style="margin-left: 10px; color: var(--dim-text);"></span>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th style="width: 40px;"></th>
                <th class="rev-col">Rev</th>
                <th class="id-col">ID</th>
                <th id="header-displayName" class="name-col">Display Name</th>
                <th id="header-description" class="desc-col">Description</th>
                <th id="header-category" class="cat-col">Category</th>
                <th class="dim-col">Dim: Length (m)</th>
                <th class="dim-col">Src: Length</th>
                <th class="dim-col">Dim: Mass (kg)</th>
                <th class="dim-col">Src: Mass</th>
                <th class="dim-col">Dim: Duration (s)</th>
                <th class="dim-col">Src: Duration</th>
                <th id="header-tags" class="tag-col">Tags</th>
                <th class="dim-col">X: Length (decades)</th>
                <th class="dim-col">X: Mass (decades)</th>
                <th class="dim-col">X: Duration (decades)</th>
                <th style="width: 30px;"></th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be injected here -->
        </tbody>
    </table>

    <div id="toast" class="toast">Saved successfully!</div>

    <script>
        let tableData = [];
        let draggedIndex = null;
        const dimensionRegex = /^[<>]?[1-9](\.\d+)?[eE][-+]?\d+$/;
        const strictDimensionRegex = /^[1-9](\.\d+)?[eE][-+]?\d+$/;

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        async function loadData() {
            try {
                const response = await fetch('/data');
                tableData = await response.json();
                renderTable();
            } catch (err) {
                console.error("Failed to load data", err);
                showToast("Failed to load data", true);
            }
        }

        function renderTable() {
            const tbody = document.querySelector('#dataTable tbody');
            const lang = document.getElementById('langSelect').value;

            // Update headers
            document.getElementById('header-displayName').innerText = `Display Name (${lang})`;
            document.getElementById('header-description').innerText = `Description (${lang})`;
            document.getElementById('header-category').innerText = `Category (${lang})`;
            document.getElementById('header-tags').innerText = `Tags (${lang})`;

            tbody.innerHTML = '';

            tableData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.dataset.index = index;

                tr.addEventListener('dragover', handleDragOver);
                tr.addEventListener('drop', handleDrop);
                tr.addEventListener('dragenter', handleDragEnter);
                tr.addEventListener('dragleave', handleDragLeave);

                // Helper to safely get nested values
                const getVal = (obj, path, defaultVal = '') => {
                    const val = path.split('.').reduce((o, k) => (o || {})[k], obj);
                    return val !== undefined ? val : defaultVal;
                };

                // Helper to format tags array to string
                const tagsToString = (tags) => (tags || []).join(', ');

                // Helper to format dimensions (handles arrays)
                const formatDim = (val) => Array.isArray(val) ? val.join(', ') : val;

                // Helper to escape HTML for attribute values
                const escapeHTML = (str) => {
                    if (typeof str !== 'string') return str;
                    return str
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#039;');
                };

                tr.innerHTML = `
                    <td class="drag-handle" draggable="true">☰</td>
                    <td class="rev-col"><input type="checkbox" ${row.reviewed ? 'checked' : ''} onchange="updateData(${index}, 'reviewed', this.checked)"></td>
                    <td class="id-col"><input type="text" value="${escapeHTML(row.id)}" onchange="updateData(${index}, 'id', this.value)"></td>
                    <td><input type="text" value="${escapeHTML(getVal(row, `displayName.${lang}`))}" onchange="updateData(${index}, 'displayName.${lang}', this.value)"></td>
                    <td><input type="text" value="${escapeHTML(getVal(row, `description.${lang}`))}" onchange="updateData(${index}, 'description.${lang}', this.value)"></td>
                    <td><input type="text" value="${escapeHTML(getVal(row, `category.${lang}`))}" onchange="updateData(${index}, 'category.${lang}', this.value)"></td>
                    <td><input type="text" class="dim-col" data-field="dimensions.length" value="${escapeHTML(formatDim(getVal(row, 'dimensions.length')))}" onchange="updateData(${index}, 'dimensions.length', this.value)"></td>
                    <td><input type="text" class="dim-col" value="${escapeHTML(getVal(row, 'sources.length'))}" onchange="updateData(${index}, 'sources.length', this.value)"></td>
                    <td><input type="text" class="dim-col" data-field="dimensions.mass" value="${escapeHTML(formatDim(getVal(row, 'dimensions.mass')))}" onchange="updateData(${index}, 'dimensions.mass', this.value)"></td>
                    <td><input type="text" class="dim-col" value="${escapeHTML(getVal(row, 'sources.mass'))}" onchange="updateData(${index}, 'sources.mass', this.value)"></td>
                    <td><input type="text" class="dim-col" data-field="dimensions.duration" value="${escapeHTML(formatDim(getVal(row, 'dimensions.duration')))}" onchange="updateData(${index}, 'dimensions.duration', this.value)"></td>
                    <td><input type="text" class="dim-col" value="${escapeHTML(getVal(row, 'sources.duration'))}" onchange="updateData(${index}, 'sources.duration', this.value)"></td>
                    <td><input type="text" value="${escapeHTML(tagsToString(getVal(row, `tags.${lang}`, [])))}" onchange="updateTags(${index}, 'tags.${lang}', this.value)"></td>
                    <td><input type="text" class="dim-col" data-field="x_coordinates.length" value="${escapeHTML(getVal(row, 'x_coordinates.length'))}" onchange="updateX(${index}, 'x_coordinates.length', this.value)"></td>
                    <td><input type="text" class="dim-col" data-field="x_coordinates.mass" value="${escapeHTML(getVal(row, 'x_coordinates.mass'))}" onchange="updateX(${index}, 'x_coordinates.mass', this.value)"></td>
                    <td><input type="text" class="dim-col" data-field="x_coordinates.duration" value="${escapeHTML(getVal(row, 'x_coordinates.duration'))}" onchange="updateX(${index}, 'x_coordinates.duration', this.value)"></td>
                    <td style="text-align: center; vertical-align: middle;"><button class="remove-btn" onclick="deleteRow(${index})" title="Remove">×</button></td>
                `;
                const handle = tr.querySelector('.drag-handle');
                handle.addEventListener('dragstart', handleDragStart);
                handle.addEventListener('dragend', handleDragEnd);

                tbody.appendChild(tr);
            });
        }

        // Deep set helper
        function setVal(obj, path, value) {
            const keys = path.split('.');
            let current = obj;
            for (let i = 0; i < keys.length - 1; i++) {
                if (!current[keys[i]]) current[keys[i]] = {};
                current = current[keys[i]];
            }
            current[keys[keys.length - 1]] = value;
        }

        // Deep delete helper
        function deleteVal(obj, path) {
            const keys = path.split('.');
            let current = obj;
            for (let i = 0; i < keys.length - 1; i++) {
                if (!current[keys[i]]) return; // Path doesn't exist
                current = current[keys[i]];
            }
            delete current[keys[keys.length - 1]];
        }



        window.deleteRow = function (index) {
            if (confirm("Are you sure you want to delete this row?")) {
                tableData.splice(index, 1);
                renderTable();
            }
        };

        window.updateData = function (index, path, value) {
            if (typeof value === 'string' && value.trim() === '') {
                deleteVal(tableData[index], path);
            } else {
                let finalValue = value;
                if (typeof value === 'string') {
                    finalValue = value.trim();
                    // Support comma-separated ranges for dimensions
                    if (path.startsWith('dimensions.') && finalValue.includes(',')) {
                        finalValue = finalValue.split(',').map(v => v.trim());
                    }
                }
                setVal(tableData[index], path, finalValue);
            }
        };

        window.updateX = function (index, path, value) {
            if (value.trim() === '') {
                deleteVal(tableData[index], path);
            } else {
                let str = value.trim();
                // Apply cleaning logic for precision errors (4+ zeros)
                const match = str.match(/\.(\d*?)0000/);
                if (match) {
                    str = str.substring(0, str.indexOf('.') + match[1].length + 1);
                    str = str.replace(/\.$/, "");
                    if (str.includes('.')) {
                        str = str.replace(/0+$/, "").replace(/\.$/, "");
                    }
                }
                setVal(tableData[index], path, str);
            }
        };

        window.updateTags = function (index, path, value) {
            if (value.trim() === '') {
                deleteVal(tableData[index], path);
            } else {
                const tags = value.split(',').map(t => t.trim()).filter(t => t);
                setVal(tableData[index], path, tags);
            }
        };

        // Drag and Drop Logic
        function handleDragStart(e) {
            const tr = this.closest('tr');
            draggedIndex = Number(tr.dataset.index);
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedIndex);
            tr.classList.add('dragging');
        }

        function handleDragOver(e) {
            if (e.preventDefault) {
                e.preventDefault();
            }
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnter(e) {
            this.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.stopPropagation(); // stops the browser from redirecting.
            e.preventDefault();

            // "this" is the drop target row
            this.classList.remove('drag-over');
            const targetIndex = Number(this.dataset.index);

            if (draggedIndex !== null && draggedIndex !== targetIndex) {
                // Reorder
                const movedItem = tableData.splice(draggedIndex, 1)[0];
                tableData.splice(targetIndex, 0, movedItem);
                renderTable();
            }

            return false;
        }

        // Insertion Logic
        const leftBtn = document.getElementById('leftInsertBtn');
        const rightBtn = document.getElementById('rightInsertBtn');
        const insertLine = document.getElementById('insertLine');
        let hoverIndex = -1;

        document.addEventListener('mousemove', (e) => {
            // Only show if near margins or hovering buttons
            const isNearLeft = e.clientX < 50;
            const isNearRight = e.clientX > window.innerWidth - 50;
            const isHoveringLeft = e.target === leftBtn;
            const isHoveringRight = e.target === rightBtn;

            if (!isNearLeft && !isNearRight && !isHoveringLeft && !isHoveringRight) {
                hideInsertControls();
                return;
            }

            // Find closest row boundary
            const tbody = document.querySelector('#dataTable tbody');
            const rows = Array.from(tbody.children);
            if (rows.length === 0) return;

            let closestDist = Infinity;
            let closestY = 0;
            let closestIndex = -1;

            // Check top of first row
            const firstRect = rows[0].getBoundingClientRect();
            const distTop = Math.abs(e.clientY - firstRect.top);
            if (distTop < closestDist) {
                closestDist = distTop;
                closestY = firstRect.top;
                closestIndex = 0;
            }

            // Check bottom of all rows
            rows.forEach((row, i) => {
                const rect = row.getBoundingClientRect();
                const distBottom = Math.abs(e.clientY - rect.bottom);
                if (distBottom < closestDist) {
                    closestDist = distBottom;
                    closestY = rect.bottom;
                    closestIndex = i + 1;
                }
            });

            // Threshold for snapping
            if (closestDist > 30) {
                hideInsertControls();
                return;
            }

            hoverIndex = closestIndex;
            showInsertControls(closestY, isNearLeft || isHoveringLeft ? 'left' : 'right');
        });

        function showInsertControls(y, side) {
            insertLine.style.top = y + 'px';
            insertLine.style.display = 'block';

            if (side === 'left') {
                leftBtn.style.top = y + 'px';
                leftBtn.style.display = 'block';
                rightBtn.style.display = 'none';
            } else {
                rightBtn.style.top = y + 'px';
                rightBtn.style.display = 'block';
                leftBtn.style.display = 'none';
            }
        }

        function hideInsertControls() {
            leftBtn.style.display = 'none';
            rightBtn.style.display = 'none';
            insertLine.style.display = 'none';
            hoverIndex = -1;
        }

        function insertRow() {
            if (hoverIndex === -1) return;

            const newRow = {
                id: "",
                reviewed: false,
                displayName: { "en-us": "" },
                description: { "en-us": "" },
                category: { "en-us": "" },
                dimensions: {},
                tags: { "en-us": [] },
                x_coordinates: {}
            };

            tableData.splice(hoverIndex, 0, newRow);
            renderTable();
            hideInsertControls();
        }

        leftBtn.addEventListener('click', insertRow);
        rightBtn.addEventListener('click', insertRow);

        function handleDragEnd(e) {
            const tr = this.closest('tr');
            tr.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            draggedIndex = null;
        }

        async function saveData() {
            // Trigger change event on focused input by blurring it
            if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                document.activeElement.blur();
            }

            // Small delay to allow change event to propagate 
            await new Promise(r => setTimeout(r, 50));

            // Clear previous errors
            document.querySelectorAll('input.invalid').forEach(el => el.classList.remove('invalid'));

            // Validation
            for (let i = 0; i < tableData.length; i++) {
                const row = tableData[i];
                const tr = document.querySelector(`tr[data-index="${i}"]`);
                const id = row.id || row.displayName?.['en-us'] || `Row ${i + 1}`;

                // Validate dimensions
                const dims = ['length', 'mass', 'duration'];
                for (const dim of dims) {
                    const val = row.dimensions?.[dim];
                    if (val) {
                        if (Array.isArray(val)) {
                            // Validate array (range)
                            if (val.length !== 2) {
                                tr.querySelector(`input[data-field="dimensions.${dim}"]`).classList.add('invalid');
                                showError(`Cannot save: ${id} -> Dim: ${dim.charAt(0).toUpperCase() + dim.slice(1)} range must have exactly 2 elements (only one comma allowed)`);
                                return;
                            }
                            for (const v of val) {
                                if (v.startsWith('-')) {
                                    tr.querySelector(`input[data-field="dimensions.${dim}"]`).classList.add('invalid');
                                    showError(`Cannot save: ${id} -> Dim: ${dim.charAt(0).toUpperCase() + dim.slice(1)}: negative quantities aren't allowed`);
                                    return;
                                }
                                if (typeof v !== 'string' || !strictDimensionRegex.test(v)) {
                                    tr.querySelector(`input[data-field="dimensions.${dim}"]`).classList.add('invalid');
                                    showError(`Cannot save: ${id} -> Dim: ${dim.charAt(0).toUpperCase() + dim.slice(1)} range element "${v}" is not strictly scientific notation (no < or > allowed)`);
                                    return;
                                }
                            }
                            if (Number(val[0]) > Number(val[1])) {
                                tr.querySelector(`input[data-field="dimensions.${dim}"]`).classList.add('invalid');
                                showError(`Cannot save: ${id} -> Dim: ${dim.charAt(0).toUpperCase() + dim.slice(1)} range is not in order (start must be <= end)`);
                                return;
                            }
                        } else {
                            // Validate single value
                            if (val.startsWith('-')) {
                                tr.querySelector(`input[data-field="dimensions.${dim}"]`).classList.add('invalid');
                                showError(`Cannot save: ${id} -> Dim: ${dim.charAt(0).toUpperCase() + dim.slice(1)}: negative quantities aren't allowed`);
                                return;
                            }
                            if (typeof val !== 'string' || !dimensionRegex.test(val)) {
                                tr.querySelector(`input[data-field="dimensions.${dim}"]`).classList.add('invalid');
                                showError(`Cannot save: ${id} -> Dim: ${dim.charAt(0).toUpperCase() + dim.slice(1)} is not in scientific notation`);
                                return;
                            }
                        }
                    }
                }

                // Validate x_coordinates
                for (const dim of dims) {
                    const val = row.x_coordinates?.[dim];
                    if (val && (typeof val !== 'string' || val.trim() === '' || isNaN(Number(val)))) {
                        tr.querySelector(`input[data-field="x_coordinates.${dim}"]`).classList.add('invalid');
                        showError(`Cannot save: ${id} -> X: ${dim.charAt(0).toUpperCase() + dim.slice(1)} is not a number`);
                        return;
                    }
                }
            }

            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            btn.innerText = "Saving...";

            try {
                // Determine format based on structure (handled by server_editor.js logic or we send JSON)
                // We send the array of objects back.
                // NOTE: 'dimensions' values are STRINGS in our tableData.
                // 'x_coordinates' are also STRINGS.

                // Clean up data before saving
                const dataToSave = tableData.map(row => {
                    const cleanRow = { ...row };

                    // Clean x_coordinates
                    if (cleanRow.x_coordinates) {
                        if (cleanRow.x_coordinates.length === "") delete cleanRow.x_coordinates.length;
                        if (cleanRow.x_coordinates.mass === "") delete cleanRow.x_coordinates.mass;
                        if (cleanRow.x_coordinates.duration === "") delete cleanRow.x_coordinates.duration;
                        if (Object.keys(cleanRow.x_coordinates).length === 0) delete cleanRow.x_coordinates;
                    }

                    // Clean dimensions
                    if (cleanRow.dimensions) {
                        if (cleanRow.dimensions.length === "") delete cleanRow.dimensions.length;
                        if (cleanRow.dimensions.mass === "") delete cleanRow.dimensions.mass;
                        if (cleanRow.dimensions.duration === "") delete cleanRow.dimensions.duration;
                        if (Object.keys(cleanRow.dimensions).length === 0) delete cleanRow.dimensions;
                    }

                    // Clean sources
                    if (cleanRow.sources) {
                        if (cleanRow.sources.length === "") delete cleanRow.sources.length;
                        if (cleanRow.sources.mass === "") delete cleanRow.sources.mass;
                        if (cleanRow.sources.duration === "") delete cleanRow.sources.duration;
                        if (Object.keys(cleanRow.sources).length === 0) delete cleanRow.sources;
                    }

                    return cleanRow;
                });

                const response = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSave, null, 2)
                });

                if (response.ok) {
                    showToast("Saved successfully!");
                } else {
                    showToast("Error saving data", true);
                }
            } catch (err) {
                console.error(err);
                showToast("Error saving data", true);
            } finally {
                btn.innerText = originalText;
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function showError(msg) {
            showToast(msg, true);
        }

        // Shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 's') {
                e.preventDefault();
                saveData();
            }

            // Arrow key navigation
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                const input = e.target;
                if (input.tagName !== 'INPUT') return;

                const td = input.closest('td');
                if (!td) return;

                const tr = td.closest('tr');
                const tbody = tr.closest('tbody');

                const colIndex = Array.from(tr.children).indexOf(td);
                const rowIndex = Array.from(tbody.children).indexOf(tr);

                let targetRow = rowIndex;
                let targetCol = colIndex;

                if (e.key === 'ArrowUp') {
                    if (rowIndex > 0) {
                        targetRow--;
                        e.preventDefault(); // Prevent cursor moving to start of line in some browsers
                        const targetInput = tbody.children[targetRow].children[targetCol].querySelector('input');
                        if (targetInput) targetInput.focus();
                    }
                } else if (e.key === 'ArrowDown') {
                    if (rowIndex < tbody.children.length - 1) {
                        targetRow++;
                        e.preventDefault();
                        const targetInput = tbody.children[targetRow].children[targetCol].querySelector('input');
                        if (targetInput) targetInput.focus();
                    }
                } else if (e.key === 'ArrowLeft') {
                    if (input.selectionStart === 0 && input.selectionEnd === 0) {
                        if (colIndex > 0) {
                            targetCol--;
                            e.preventDefault();
                            const targetInput = tr.children[targetCol].querySelector('input');
                            if (targetInput) {
                                targetInput.focus();
                                // Optional: Move cursor to end of previous cell for seamless nav?
                                // targetInput.setSelectionRange(targetInput.value.length, targetInput.value.length);
                            }
                        }
                    }
                } else if (e.key === 'ArrowRight') {
                    if (input.selectionStart === input.value.length) {
                        if (colIndex < tr.children.length - 1) {
                            targetCol++;
                            e.preventDefault();
                            const targetInput = tr.children[targetCol].querySelector('input');
                            if (targetInput) {
                                targetInput.focus();
                                // Optional: Move cursor to start
                                // targetInput.setSelectionRange(0, 0);
                            }
                        }
                    }
                }
            }
        });

        document.getElementById('saveBtn').addEventListener('click', saveData);
        document.getElementById('langSelect').addEventListener('change', renderTable);

        // Init
        loadData();

    </script>
</body>

</html>
